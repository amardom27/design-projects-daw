<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lugares</title>
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/pages/lugares.css">
</head>

<body>
    <header class="page-header">
        <div class="first-row">
            <svg id="burguer" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-menu-2">
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M4 6l16 0" />
                <path d="M4 12l16 0" />
                <path d="M4 18l16 0" />
            </svg>
            <a class="logo-cont" href="#">
                <img id="logo" src="../../assets/images/oficial.webp" alt="Logo">
            </a>

            <a href="#" class="btn-style-1 transition">Iniciar Sesión</a>
            <a href="#" class="btn-style-2 transition">Registrarse</a>
        </div>

        <form role="search" action="" method="get" class="search-form">
            <label for="query" class="visually-hidden">
                Buscar actividades o lugares
            </label>
            <div class="search-field">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-search">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                    <path d="M21 21l-6 -6" />
                </svg>
                <input type="search" name="query" id="query" placeholder="Buscar un sitio..." autocomplete="off">
                <button type="button" class="clear-btn" aria-label="Borrar búsqueda">
                    ✕
                </button>
            </div>
        </form>
    </header>

    <hr>

    <main>
        <section class="container-first flex flex-wrap gap-4" aria-labelledby="places-heading">
            <h2 id="places-heading">Lugares destacados</h2>

            <ul class="card-list">
                <li>
                    <article class="card">
                        <a href="/mirador-del-carmen" class="transition">
                            <figure>
                                <img src="../../assets/images/mirador1.webp"
                                    alt="Vista exterior del Expositorio El Mirador del Carmen">
                                <figcaption>
                                    <p class="card-category bubble-categ-1">Museos</p>
                                    <h3>Expositorio El Mirador del Carmen</h3>
                                </figcaption>
                            </figure>
                        </a>
                    </article>
                </li>

                <li>
                    <article class="card">
                        <a href="/playa-del-cristo" class="transition">
                            <figure>
                                <img src="../../assets/images/playa-cristo1.webp"
                                    alt="Playa del Cristo con arena y mar tranquilo">
                                <figcaption>
                                    <p class="card-category bubble-categ-1">Playas</p>
                                    <h3>Playa del Cristo</h3>
                                </figcaption>
                            </figure>
                        </a>
                    </article>
                </li>

                <li>
                    <article class="card">
                        <a href="/senda-litoral" class="transition">
                            <figure>
                                <img src="../../assets/images/senda-litoral1.webp"
                                    alt="Sendero costero de la Senda Litoral junto al mar">
                                <figcaption>
                                    <p class="card-category bubble-categ-1">Lugares de interés</p>
                                    <h3>Senda Litoral</h3>
                                </figcaption>
                            </figure>
                        </a>
                    </article>
                </li>

                <li>
                    <article class="card">
                        <a href="/casa-tejerinas" class="transition">
                            <figure>
                                <img src="../../assets/images/tejerinas1.webp"
                                    alt="Fachada del Espacio Expositivo Casa de las Tejerinas">
                                <figcaption>
                                    <p class="card-category bubble-categ-1">Museos</p>
                                    <h3>Espacio Expositivo Casa de las Tejerinas</h3>
                                </figcaption>
                            </figure>
                        </a>
                    </article>
                </li>
            </ul>
        </section>
    </main>

    <footer>
        <nav>
            <h2 class="text-xl">Nuestras categorías</h2>
            <a href="#">Todas</a>
            <a href="#">Playas</a>
            <a href="#">Museos</a>
            <a href="#">Lugares de Interés</a>
            <a href="#">Murales</a>
        </nav>
        <hr>
        <div class="copyright">
            <p>© 2026 Inclúyete. All rights reserved.</p>
            <p><a href="#">Política de privacidad</a> -- <a href="#">Términos y Condiciones</a></p>
        </div>
    </footer>

    <script>
        const input = document.getElementById('query');
        const clearBtn = document.querySelector('.clear-btn');

        clearBtn.addEventListener('click', () => {
            input.value = '';
            input.focus();
        });
    </script>
</body>

</html>
